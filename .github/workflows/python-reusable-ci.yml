name: python-reusable-ci

on:
  workflow_call:

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install quality and test tools
        run: python -m pip install --upgrade pip pytest ruff black==25.11.0 mypy
      - name: Ruff
        run: ruff check .
      - name: Black (check)
        run: black --check .
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: python -m pytest
